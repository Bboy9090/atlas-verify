version: '3.9'

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlasverify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlasverify_secret}
      POSTGRES_DB: atlasverify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlasverify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Atlas Verify app ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://atlasverify:${POSTGRES_PASSWORD:-atlasverify_secret}@postgres:5432/atlasverify?sslmode=disable"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-100}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-60000}"
    env_file:
      - .env

volumes:
  postgres_data:
